services:
  postgres:
    image: postgres:16-alpine
    container_name: task-collab-postgres
    environment:
      POSTGRES_USER: taskcollab
      POSTGRES_PASSWORD: taskcollab
      POSTGRES_DB: taskcollab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskcollab -d taskcollab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
